name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_PYTHON_DOWNLOADS: never
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: Python 3.12 quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock

      - name: Install pinned uv
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Verify dependency lock
        run: uv lock --check

      - name: Synchronize locked development environment
        run: uv sync --locked --extra dev

      - name: Run Ruff lint
        run: uv run --locked --extra dev python -m ruff check .

      - name: Check Ruff formatting
        run: uv run --locked --extra dev python -m ruff format --check .

      - name: Run test suite with coverage gate
        run: >-
          uv run --locked --extra dev python -m pytest
          --cov=investment_analyst --cov-report=term-missing

      - name: Audit locked environment
        run: >-
          uv run --locked --extra dev pip-audit
          --local --skip-editable --progress-spinner off
